containernet:
  num_containers: 6
  image_name: anboiano/fedopt:latest

  volumes:
    - "/home/maxme/pro-4501/shared_data:/usr/src/app/FedOpt/src/Data"
    - "/home/maxme/pro-4501/shared_data:/usr/src/app/Data"

  device_type:
    - none    # c0 (server)
    - none    # c1 (5 Mbps)
    - none    # c2 (10 Mbps)
    - none    # c3 (20 Mbps)
    - none    # c4 (35 Mbps)
    - none    # c5 (50 Mbps)

  network_type:
    - none
    - none
    - none
    - none
    - none
    - none

  host_single_core_score: 1554
  device_variance: 0.05
  enable_tcpdump: false

  nodes:
    - id: 1
      link:
        bandwidth_mbps: 5
        delay_ms: 45
    - id: 2
      link:
        bandwidth_mbps: 10
        delay_ms: 35
    - id: 3
      link:
        bandwidth_mbps: 20
        delay_ms: 25
    - id: 4
      link:
        bandwidth_mbps: 35
        delay_ms: 15
    - id: 5
      link:
        bandwidth_mbps: 50
        delay_ms: 10

application:
  name: baseline_fedavg_mnist

  variables:
    protocol: grpc          
    port: 8082              
    fl_method: FedAvg       
    model: MLP              
    dataset: MNIST          
    rounds: 50              
    epochs: 5               
    min_clients: 5          
    num_client: 5           
    parts_dataset: 5        
    iid: 1.0                
    alpha: 10
    lr: 0.05

  roles:
    server:
      container_ids: [0]
      command: >-
        env TORCH_MKLDNN_ENABLED=0 DNNL_DEFAULT_FPMATH_MODE=0 MKL_DEBUG_CPU_TYPE=5
        python3 -u run.py
        --protocol {protocol}
        --mode Server
        --port {port}
        --ip {container_ip}
        --fl_method {fl_method}
        --model {model}
        --dataset {dataset}
        --rounds {rounds}
        --epochs {epochs}
        --min_clients {min_clients}
        --num_client {num_client}
        --parts_dataset {parts_dataset}
        --iid {iid}
        --alpha {alpha}
        --lr {lr}
        --index 0
        --accuracy_file /app/saved_output/baseline_accuracy.png
        --loss_file /app/saved_output/baseline_loss.png
        --verbose info
      startup_delay: 0
      wait_for_completion: true

    client:
      container_ids: "all_except_server"
      command: >-
        env TORCH_MKLDNN_ENABLED=0 DNNL_DEFAULT_FPMATH_MODE=0 MKL_DEBUG_CPU_TYPE=5
        python3 -u run.py
        --protocol {protocol}
        --mode Client
        --port {port}
        --ip {ip_0}
        --my_ip {container_ip}
        --fl_method {fl_method}
        --model {model}
        --dataset {dataset}
        --epochs {epochs}
        --parts_dataset {parts_dataset}
        --iid {iid}
        --alpha {alpha}
        --lr {lr}
        --index {container_id}
        --verbose info
      startup_delay: 30
      wait_for_completion: true

  role_order:
    - server
    - client